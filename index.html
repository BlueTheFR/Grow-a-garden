<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grow a Garden</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111; color: #eee;
  font-family: 'Courier New', monospace;
  overflow: hidden; width: 100vw; height: 100vh;
  cursor: none; user-select: none;
}

/* ── CURSOR ── */
#cursor { position:fixed; width:18px; height:18px; border:2px solid #fff; border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); z-index:9999; }
#cursor.has-seed { background:rgba(80,200,80,0.35); border-color:#8f8; }
#cursor-label { position:fixed; font-size:16px; pointer-events:none; transform:translate(6px,-20px); z-index:9999; line-height:1; }

/* ── OVERLAYS ── */
#night-overlay { position:fixed; inset:0; background:rgba(0,0,25,0); pointer-events:none; transition:background 4s ease; z-index:5; }
body.night #night-overlay { background:rgba(0,0,25,0.5); }
#weather-canvas { position:fixed; inset:0; pointer-events:none; z-index:6; }

/* ── LAYOUT ── */
#left-panel { position:absolute; left:0; top:0; bottom:0; width:180px; background:#151515; border-right:2px solid #333; display:flex; flex-direction:column; z-index:10; }
#right-panel { position:absolute; right:0; top:0; bottom:0; width:180px; background:#151515; border-left:2px solid #333; display:flex; flex-direction:column; z-index:10; }
#top-bar { position:absolute; left:180px; right:180px; top:0; height:44px; background:#151515; border-bottom:2px solid #333; display:flex; align-items:center; gap:8px; padding:0 12px; z-index:10; }
#bottom-bar { position:absolute; left:180px; right:180px; bottom:0; height:88px; background:#151515; border-top:2px solid #333; display:flex; align-items:center; padding:6px 10px; gap:4px; z-index:10; overflow-x:auto; }
#map-area { position:absolute; left:180px; right:180px; top:44px; bottom:88px; background:#1a1a1a; overflow:hidden; }

/* ── PLOTS ── */
#plots-wrap { position:absolute; inset:8px; display:grid; grid-template-columns:repeat(10,1fr); grid-auto-rows:1fr; gap:4px; }
.plot {
  aspect-ratio:1/1;
  background:#231408;
  border:2px solid #4a3520;
  border-radius:3px; cursor:none;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:visible;
}
.plot:hover { border-color:#888; }
.plot.ready { border-color:#3d3; box-shadow:0 0 4px #3d3; }
.plot.fav-plot { border-color:#f33 !important; }
.plot.move-hover { border-color:#fa0 !important; box-shadow:0 0 6px #fa0; }

/* mutation box-shadows stack via filter on children; plot border changes */
.plot .plant-wrap { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; width:100%; height:100%; gap:0; padding:2px 2px 0; position:relative; overflow:hidden; }
.p-main { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; width:100%; }
.p-icon { line-height:1; }
.p-icon.sz-tiny   { font-size:11px; }
.p-icon.sz-small  { font-size:14px; }
.p-icon.sz-normal { font-size:18px; }
.p-icon.sz-big    { font-size:22px; }
.p-icon.sz-huge   { font-size:26px; }

/* Growing = colored; done crop = full color */
.p-icon.growing   { filter:none; }
.p-icon.done-crop { filter:none; }

.p-name { font-size:8px; color:#aaa; text-align:center; overflow:hidden; max-width:100%; white-space:normal; word-break:break-word; line-height:1.15; font-weight:bold; max-height:20px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.p-bar-bg { width:80%; height:2px; background:#333; border-radius:1px; margin-top:1px; }
.p-bar { height:100%; background:#4a4; border-radius:1px; }
.p-heart { position:absolute; top:1px; right:2px; font-size:9px; color:#f33; line-height:1; z-index:2; }

/* mutation icon row — base size 12px, shrinks with data-count attribute */
.p-muts { display:flex; flex-wrap:wrap; justify-content:center; gap:1px; min-height:10px; width:100%; padding:0 1px; }
.p-muts[data-n="1"] .p-mut-icon { font-size:12px; }
.p-muts[data-n="2"] .p-mut-icon { font-size:11px; }
.p-muts[data-n="3"] .p-mut-icon { font-size:10px; }
.p-muts[data-n="4"] .p-mut-icon { font-size:9px; }
.p-muts[data-n="5"] .p-mut-icon { font-size:8px; }
.p-mut-icon { font-size:9px; line-height:1; }

/* plot glow per mutation — we apply via inline style for stacking */

/* ── BLOOD MOON ── */
#bloodmoon-overlay { position:fixed; inset:0; background:rgba(120,0,0,0); pointer-events:none; transition:background 5s ease; z-index:4; }
body.bloodmoon #bloodmoon-overlay { background:rgba(120,0,0,0.22); }
body.bloodmoon #night-overlay { background:rgba(30,0,10,0.55) !important; }

/* ── SANDSTORM ── */
#sandstorm-overlay { position:fixed; inset:0; background:rgba(180,140,60,0); pointer-events:none; transition:background 4s ease; z-index:4; }
body.sandstorm #sandstorm-overlay { background:rgba(180,140,60,0.18); }

/* ── DISCO ── */
#disco-overlay { position:fixed; inset:0; background:rgba(0,0,0,0); pointer-events:none; z-index:4; transition:background 0.15s; }
body.disco #disco-overlay { animation:disco-flash 0.5s infinite alternate; }
@keyframes disco-flash {
  0%   { background:rgba(255,0,200,0.06); }
  25%  { background:rgba(0,200,255,0.06); }
  50%  { background:rgba(255,220,0,0.06); }
  75%  { background:rgba(0,255,120,0.06); }
  100% { background:rgba(200,0,255,0.06); }
}
/* Disco rainbow glow on plants with disco mutation */
@keyframes disco-glow {
  0%   { box-shadow: inset 0 0 10px rgba(255,0,200,0.8); }
  16%  { box-shadow: inset 0 0 10px rgba(255,120,0,0.8); }
  33%  { box-shadow: inset 0 0 10px rgba(255,240,0,0.8); }
  50%  { box-shadow: inset 0 0 10px rgba(0,255,80,0.8);  }
  66%  { box-shadow: inset 0 0 10px rgba(0,180,255,0.8); }
  83%  { box-shadow: inset 0 0 10px rgba(140,0,255,0.8); }
  100% { box-shadow: inset 0 0 10px rgba(255,0,200,0.8); }
}
.plot.disco-plant { animation: disco-glow 1s linear infinite !important; }

/* ── AURORA ── */
#aurora-overlay { position:fixed; inset:0; background:rgba(0,255,150,0); pointer-events:none; transition:background 5s ease; z-index:4; }
body.aurora #aurora-overlay { animation: aurora-wave 6s ease-in-out infinite alternate; }
@keyframes aurora-wave {
  0%   { background:rgba(0,255,150,0.07); }
  33%  { background:rgba(0,180,255,0.09); }
  66%  { background:rgba(100,0,255,0.07); }
  100% { background:rgba(0,255,200,0.08); }
}

/* ── COMPACT NUMBER FORMAT ── */
body.compact-nums .money-display:after { content: ''; }
#money-row { padding:6px 8px 3px; font-size:13px; color:#fd4; font-weight:bold; }
#inv-open-btn { margin:2px 6px 3px; background:#1e1e1e; border:1px solid #333; color:#bbb; padding:4px 6px; border-radius:3px; cursor:pointer; font-family:inherit; font-size:10px; text-align:left; }
#inv-open-btn:hover { background:#252525; }
#sell-shop { flex:1; margin:3px 6px 6px; border:2px solid #700; background:#180a0a; border-radius:4px; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
.shop-hdr { padding:4px 8px; font-size:11px; font-weight:bold; display:flex; align-items:center; justify-content:space-between; }
#sell-hdr { background:#700; color:#fbb; }
#sell-body { flex:1; overflow-y:auto; padding:3px; }
.sell-row { display:flex; align-items:center; gap:3px; padding:2px 3px; border-bottom:1px solid #240000; cursor:pointer; font-size:10px; }
.sell-row:hover { background:#200000; }
.sell-row .sri { font-size:13px; }
.sell-row .srn { color:#faa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sell-row .srv { color:#f84; font-size:9px; }
#sell-all-btn { background:#900; color:#fcc; border:none; border-top:1px solid #700; padding:5px; cursor:pointer; font-family:inherit; font-size:10px; font-weight:bold; }
#sell-all-btn:hover { background:#b00; }
.sell-row .sell-plant-btn { background:#500; border:1px solid #a00; color:#faa; font-size:8px; padding:1px 4px; border-radius:2px; cursor:pointer; font-family:inherit; flex-shrink:0; white-space:nowrap; }
.sell-row .sell-plant-btn:hover { background:#700; }

/* ── RIGHT PANEL ── */
#weather-row { padding:4px 8px 2px; font-size:11px; color:#aaa; }
#wx-timer-row { padding:0px 8px 2px; font-size:10px; color:#666; }
#daytime-row { padding:1px 8px 3px; font-size:11px; color:#fd4; }
#seed-shop { flex:1; margin:3px 6px 3px; border:2px solid #007; background:#06060f; border-radius:4px; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
#seed-hdr { background:#007; color:#bbf; }
#restock-time { font-size:9px; color:#88f; }
#seed-body { flex:1; overflow-y:auto; padding:3px; }
.seed-row { display:flex; align-items:center; gap:3px; padding:2px 3px; border-bottom:1px solid #040414; cursor:pointer; font-size:10px; }
.seed-row:hover { background:#050520; }
.seed-row .sri { font-size:13px; }
.seed-row .srn { color:#aaf; }
.seed-row .srp { color:#fd4; font-size:9px; }
.seed-row .srs { color:#555; font-size:9px; }
.rc { font-size:8px; }
/* ── RARITY COLORS (legend=yellow, divine=orange, prismatic=rainbow) ── */
.rc-common{color:#888;} .rc-uncommon{color:#4e4;} .rc-rare{color:#55f;} .rc-epic{color:#a4f;}
.rc-legendary{color:#fd4;} .rc-divine{color:#f80;} .rc-prismatic{background:linear-gradient(90deg,#f44,#fa0,#ff0,#4e4,#44f,#a4f,#f4a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:bold;}

/* ── PLANT NAME — two lines allowed ── */
.p-name { font-size:7px; color:#aaa; text-align:center; overflow:hidden; max-width:100%; white-space:normal; word-break:break-word; line-height:1.15; font-weight:bold; max-height:20px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }

/* ── TOOLTIP — always above cursor ── */
#tt { position:fixed; background:rgba(10,10,10,0.97); border:1px solid #555; border-radius:5px; padding:7px 11px; font-size:11px; pointer-events:none; z-index:10000; max-width:230px; display:none; line-height:1.5; }
#tt.show { display:block; }
.tt-n { font-weight:bold; font-size:12px; }
.tt-fav { color:#f33; font-size:10px; }
.tt-s { color:#aaa; font-size:10px; }
.tt-m { font-size:10px; }
.tt-total { color:#ff8; font-size:10px; font-style:italic; }
.tt-v { color:#fd4; font-size:11px; font-weight:bold; }
.tt-base { color:#888; font-size:9px; }
.tt-t { color:#666; font-size:10px; }

/* ── MOON SHOP ── */
#seed-hdr.moon-shop { background:linear-gradient(90deg,#114,#226); color:#adf; }
#seed-hdr.blood-shop { background:linear-gradient(90deg,#400,#600); color:#faa; }

/* ── MOBILE RESPONSIVE (improved) ── */
@media (max-width: 700px) {
  body { cursor:auto; }
  #cursor, #cursor-label { display:none; }
  #left-panel, #right-panel { width:0; overflow:hidden; border:none; }
  #top-bar { left:0; right:0; height:44px; gap:3px; padding:0 4px; flex-wrap:nowrap; overflow-x:auto; }
  #bottom-bar { left:0; right:0; height:80px; padding:4px 4px; gap:3px; }
  #map-area { left:0; right:0; top:44px; bottom:80px; }
  #plots-wrap { inset:3px; gap:2px; }
  .p-icon.sz-tiny   { font-size:14px; }
  .p-icon.sz-small  { font-size:17px; }
  .p-icon.sz-normal { font-size:21px; }
  .p-icon.sz-big    { font-size:25px; }
  .p-icon.sz-huge   { font-size:29px; }
  .p-name { font-size:6px; max-height:16px; -webkit-line-clamp:2; }
  .p-mut-icon { font-size:9px; }
  .b-slot { width:60px; height:60px; }
  .b-si { font-size:21px; }
  .b-sn { font-size:7px; }
  #mobile-panels { display:flex !important; }
  .tb-btn { font-size:9px; padding:4px 5px; }
  #top-info { display:none; }
  #tt { max-width:200px; font-size:10px; }
}
@media (max-width: 700px) {
  #mobile-panels { position:fixed; bottom:80px; left:0; right:0; z-index:20; display:none; flex-direction:row; gap:0; max-height:240px; }
  #mobile-left { flex:1; background:#151515; border-top:2px solid #700; overflow-y:auto; display:flex; flex-direction:column; }
  #mobile-right { flex:1; background:#151515; border-top:2px solid #007; overflow-y:auto; display:flex; flex-direction:column; }
  #mobile-panel-toggle { display:flex !important; }
}
#mobile-panel-toggle { display:none; }
#mobile-panels { display:none; }

#settings-btn-r { margin:3px 6px 6px; background:#1e1e1e; border:1px solid #333; color:#bbb; padding:4px 6px; border-radius:3px; cursor:pointer; font-family:inherit; font-size:10px; text-align:left; }
#settings-btn-r:hover { background:#252525; }

/* ── TOP BAR ── */
.tb-btn { background:#1e1e1e; border:1px solid #333; color:#bbb; padding:4px 8px; border-radius:3px; cursor:pointer; font-family:inherit; font-size:10px; white-space:nowrap; }
.tb-btn:hover { background:#252525; }
#fav-btn { background:#1e1e1e; border:1px solid #333; color:#bbb; padding:4px 10px; border-radius:3px; cursor:pointer; font-family:inherit; font-size:11px; }
#fav-btn:hover { background:#252525; }
#fav-btn.on { border-color:#f44; color:#f88; }
#move-btn { background:#1e1e1e; border:1px solid #333; color:#bbb; padding:4px 10px; border-radius:3px; cursor:pointer; font-family:inherit; font-size:11px; }
#move-btn:hover { background:#252525; }
#move-btn.on { border-color:#fa0; color:#fc6; }
#harvest-all-btn { background:#1e1e1e; border:1px solid #333; color:#bbb; padding:4px 8px; border-radius:3px; cursor:pointer; font-family:inherit; font-size:11px; }
#harvest-all-btn:hover { background:#252525; color:#afa; }
#top-info { font-size:10px; color:#555; }

/* ── BOTTOM BAR ── */
.b-slot { width:68px; height:68px; flex-shrink:0; background:#1c1c1c; border:1px solid #2e2e2e; border-radius:3px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.b-slot:hover { border-color:#555; }
.b-slot.sel { border:2px solid #4e4; }
.b-slot.empty { opacity:0.3; }
.b-si { font-size:22px; }
.b-sn { font-size:8px; color:#777; text-align:center; max-width:62px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.b-sq { font-size:9px; color:#fd4; }
.b-snum { font-size:9px; color:#3a3a3a; }

/* ── TOOLTIP ── */
#tt { position:fixed; background:rgba(10,10,10,0.97); border:1px solid #555; border-radius:5px; padding:7px 11px; font-size:11px; pointer-events:none; z-index:10000; max-width:220px; display:none; line-height:1.5; }
#tt.show { display:block; }
.tt-n { font-weight:bold; color:#fff; font-size:12px; }
.tt-fav { color:#f33; font-size:10px; }
.tt-s { color:#aaa; font-size:10px; }
.tt-m { font-size:10px; }
.tt-v { color:#fd4; font-size:10px; font-weight:bold; }
.tt-base { color:#888; font-size:9px; }
.tt-t { color:#666; font-size:10px; }

/* ── NOTIFICATIONS ── */
#notifs { position:fixed; top:52px; left:50%; transform:translateX(-50%); z-index:500; display:flex; flex-direction:column; align-items:center; gap:3px; pointer-events:none; }
.notif { background:rgba(20,20,20,0.95); border:1px solid #555; border-radius:4px; padding:4px 14px; font-size:11px; animation:nf 3s forwards; white-space:nowrap; }
@keyframes nf { 0%{opacity:0;transform:translateY(-8px)} 12%{opacity:1;transform:translateY(0)} 75%{opacity:1} 100%{opacity:0} }

/* ── LIGHTNING FLASH ── */
#lightning-flash { position:fixed; inset:0; background:rgba(180,180,255,0); pointer-events:none; z-index:7; transition:background 0.05s; }
#lightning-flash.strike { background:rgba(180,180,255,0.35); }

/* ── INV MODAL ── */
#inv-modal { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:200; display:none; align-items:center; justify-content:center; }
#inv-modal.open { display:flex; }
#inv-box { background:#1c1c1c; border:1px solid #444; border-radius:8px; width:620px; max-height:82vh; display:flex; flex-direction:column; overflow:hidden; }
#inv-hdr { background:#232323; padding:8px 14px; display:flex; align-items:center; border-bottom:1px solid #2e2e2e; gap:8px; }
#inv-htitle { flex:1; font-size:13px; font-weight:bold; }
#inv-close { background:none; border:none; color:#777; cursor:pointer; font-size:17px; }
#inv-filters { display:flex; gap:4px; padding:5px 10px; background:#1e1e1e; border-bottom:1px solid #2e2e2e; }
.ifbtn { background:#272727; border:1px solid #333; color:#888; padding:3px 8px; border-radius:3px; cursor:pointer; font-size:10px; font-family:inherit; }
.ifbtn:hover { background:#303030; }
.ifbtn.active { background:#353535; color:#eee; border-color:#555; }
#inv-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; padding:8px; overflow-y:auto; flex:1; }
.ig { background:#222; border:1px solid #2e2e2e; border-radius:4px; padding:5px 3px; display:flex; flex-direction:column; align-items:center; cursor:pointer; position:relative; min-height:70px; transition:border-color 0.1s; }
.ig:hover { border-color:#555; }
.ig.faved { border-color:#f33; }
.ig .ig-i { font-size:20px; }
.ig .ig-n { font-size:9px; color:#888; text-align:center; }
.ig .ig-q { font-size:9px; color:#fd4; }
.ig .ig-v { font-size:8px; color:#666; }
.ig .ig-f { position:absolute; top:2px; right:3px; color:#f33; font-size:9px; }

/* ── SETTINGS MODAL ── */
#set-modal { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:200; display:none; align-items:center; justify-content:center; }
#set-modal.open { display:flex; }
#set-box { background:#1c1c1c; border:1px solid #444; border-radius:8px; padding:18px; width:280px; display:flex; flex-direction:column; gap:11px; }
.set-title { font-size:13px; font-weight:bold; }
.set-row { display:flex; align-items:center; justify-content:space-between; font-size:12px; }
.tog { background:#272727; border:1px solid #3a3a3a; color:#bbb; padding:3px 10px; border-radius:3px; cursor:pointer; font-family:inherit; font-size:10px; min-width:46px; }
.tog.on { background:#062006; border-color:#2a5a2a; color:#7d7; }
.tog:hover { opacity:0.85; }

@media (hover:none) {
  .plot { cursor:pointer; }
  .b-slot { cursor:pointer; }
  .seed-row { cursor:pointer; }
  .sell-row { cursor:pointer; }
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:#111; }
::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }

/* ── BLOOD MOON ── */
#bloodmoon-overlay { position:fixed; inset:0; background:rgba(120,0,0,0); pointer-events:none; transition:background 5s ease; z-index:4; }
body.bloodmoon #bloodmoon-overlay { background:rgba(120,0,0,0.22); }
body.bloodmoon #night-overlay { background:rgba(30,0,10,0.55); }

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 700px) {
  body { cursor: auto; }
  #cursor, #cursor-label { display: none; }
  /* Hide desktop side panels — use mobile drawer instead */
  #left-panel, #right-panel { width:0; overflow:hidden; border:none; }
  /* Top bar */
  #top-bar { left:0; right:0; height:44px; gap:3px; padding:0 4px; overflow-x:auto; }
  /* Bottom seed bar */
  #bottom-bar { left:0; right:0; height:72px; padding:3px 4px; gap:3px; }
  .b-slot { width:54px; height:54px; }
  .b-si { font-size:20px; }
  .b-sn { font-size:7px; }
  /* Map */
  #map-area { left:0; right:0; top:44px; bottom:72px; }
  /* Plots: smaller gap, fill area */
  #plots-wrap { position:absolute; inset:3px; display:grid; grid-template-columns:repeat(10,1fr); grid-auto-rows:1fr; gap:2px; }
  .p-icon.sz-tiny   { font-size:12px; }
  .p-icon.sz-small  { font-size:15px; }
  .p-icon.sz-normal { font-size:18px; }

  .p-icon.sz-huge   { font-size:24px; }

  /* Top-bar buttons smaller */
  .tb-btn { font-size:9px; padding:3px 5px; }

  /* Tooltip smaller on mobile */

  #inv-box { width:100vw; max-height:92vh; border-radius:0; }
  #inv-grid { grid-template-columns:repeat(5,1fr); }
  /* Mobile panel toggle visible */
  #mobile-panel-toggle { display:flex !important; }
}

/* Mobile slide-up panel (sell shop + seed shop) */
#mobile-panel-toggle { display:none; }

// Compact number formatting — handles up to Qi (quintillion)
function fmt(n){
  n=Math.round(n);
  if(!G||!G.compactNums)return n.toLocaleString();
  const abs=Math.abs(n);
  if (abs >= 1e303) return (n / 1e303).toFixed(1).replace(/\.0+$/, '') + "Ct";
  if (abs >= 1e100) return (n / 1e100).toFixed(1).replace(/\.0+$/, '') + "Gg";
  if (abs >= 1e63)  return (n / 1e63).toFixed(1).replace(/\.0+$/, '')  + "Vi";
  if (abs >= 1e60)  return (n / 1e60).toFixed(1).replace(/\.0+$/, '')  + "NV";
  if (abs >= 1e57)  return (n / 1e57).toFixed(1).replace(/\.0+$/, '')  + "OV";
  if (abs >= 1e54)  return (n / 1e54).toFixed(1).replace(/\.0+$/, '')  + "SpV";
  if (abs >= 1e51)  return (n / 1e51).toFixed(1).replace(/\.0+$/, '')  + "SxV";
  if (abs >= 1e48)  return (n / 1e48).toFixed(1).replace(/\.0+$/, '')  + "QnV";
  if (abs >= 1e45)  return (n / 1e45).toFixed(1).replace(/\.0+$/, '')  + "QdV";
  if (abs >= 1e42)  return (n / 1e42).toFixed(1).replace(/\.0+$/, '')  + "TV";
  if (abs >= 1e39)  return (n / 1e39).toFixed(1).replace(/\.0+$/, '')  + "DV";
  if (abs >= 1e36)  return (n / 1e36).toFixed(1).replace(/\.0+$/, '')  + "Ud";
  if (abs >= 1e33)  return (n / 1e33).toFixed(1).replace(/\.0+$/, '')  + "Dc";
  if (abs >= 1e30)  return (n / 1e30).toFixed(1).replace(/\.0+$/, '')  + "No";
  if (abs >= 1e27)  return (n / 1e27).toFixed(1).replace(/\.0+$/, '')  + "Oc";
  if (abs >= 1e24)  return (n / 1e24).toFixed(1).replace(/\.0+$/, '')  + "Sp";
  if (abs >= 1e21)  return (n / 1e21).toFixed(1).replace(/\.0+$/, '')  + "Sx";
  if (abs >= 1e18)  return (n / 1e18).toFixed(1).replace(/\.0$/, '')   + "Qn";
  if (abs >= 1e15)  return (n / 1e15).toFixed(1).replace(/\.0$/, '')   + "QD";
  if (abs >= 1e12)  return (n / 1e12).toFixed(1).replace(/\.0$/, '')   + "T";
  if (abs >= 1e9)   return (n / 1e9).toFixed(1).replace(/\.0$/, '')    + "B";
  if (abs >= 1e6)   return (n / 1e6).toFixed(1).replace(/\.0$/, '')    + "M";
  if (abs >= 1e3)   return (n / 1e3).toFixed(1).replace(/\.0$/, '')    + "k";
  return n.toString();
}

// Format time: if compactNums, show hours/min instead of raw seconds
function fmtTime(secs){
  if(!G||!G.compactNums)return Math.round(secs)+T.ttLeft;
  const s=Math.round(secs);
  if(s>=3600){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h+'h'+(m>0?m+'m':'');}
  if(s>=60){const m=Math.floor(s/60),r=s%60;return m+'m'+(r>0?r+'s':'');}
  return s+'s';
}

  if(rarity==='prismatic') return `<span style="${PRISM_GRAD}">${name}</span>`;
  return `<span style="color:${RARITY_COLOR[rarity]||'#aaf'}">${name}</span>`;
}

// Returns HTML for rarity badge

  const label=rarityLabel(rarity);

/* ═══════════════════════════════════════
   SANITIZE — clean corrupt save data
═══════════════════════════════════════ */
function sanitize(s){
  try{
    // Ensure arrays
    if(!Array.isArray(s.plots)||s.plots.length!==50) s.plots=Array(50).fill(null).map(()=>({plant:null}));
    if(!Array.isArray(s.inv))s.inv=[];
    if(!Array.isArray(s.bar)||s.bar.length!==10)s.bar=Array(10).fill(null);
    if(!Array.isArray(s.shop))s.shop=[];
    // Sanitize plots
    const validSeedIds=new Set([...SEEDS,...FLOWERS,...MOON_PLANTS,...BLOOD_PLANTS].map(x=>x.id));
    const validMuts=new Set(Object.keys(MUT_DATA));
    const validSizes=new Set(SIZES.map(x=>x.id));
    s.plots=s.plots.map(p=>{
      if(!p||typeof p!=='object')return{plant:null};
      if(!p.plant)return{plant:null};
      const pl=p.plant;
      if(!validSeedIds.has(pl.seedId)){return{plant:null};}
      pl.prog=Math.min(1,Math.max(0,Number(pl.prog)||0));
      pl.growTime=Math.max(1,Number(pl.growTime)||60);
      pl.done=!!pl.done;
      pl.fav=!!pl.fav;
      pl.regrow=!!pl.regrow;
      pl.muts=Array.isArray(pl.muts)?pl.muts.filter(m=>validMuts.has(m)):[];
      // Migrate old single mut field
      if(pl.mut&&!pl.muts.length){pl.muts=[pl.mut];delete pl.mut;}
      if(!validSizes.has(pl.size))pl.size='normal';
      return{plant:pl};
    });
    // Sanitize inventory
    s.inv=s.inv.filter(i=>{
      if(!i||typeof i!=='object')return false;
      if(i.type==='seed'&&!validSeedIds.has(i.seedId))return false;
      if(i.type==='crop'&&!validSeedIds.has(i.seedId))return false;
      if(!i.type)return false;
      i.qty=Math.max(1,Math.round(Number(i.qty)||1));
      i.muts=Array.isArray(i.muts)?i.muts.filter(m=>validMuts.has(m)):[];
      if(i.mut&&!i.muts.length){i.muts=[i.mut];delete i.mut;}
      return true;
    });
    // Sanitize bar — ensure refs are valid inv indices or null
    s.bar=s.bar.map(b=>{if(b===null||b===undefined)return null;const n=Number(b);if(!isFinite(n)||n<0||n>=s.inv.length)return null;return n;});
    // Sanitize money/day
    s.money=Math.max(0,Number(s.money)||50);
    s.day=Math.max(1,Math.round(Number(s.day)||1));
    s.tod=Math.min(1,Math.max(0,Number(s.tod)||0));
    // Blood moon: 45% chance per night (no day scheduling needed)
    if(!s.bloodMoonChance)s.bloodMoonChance=0.45;
    // Shop mode persistence
    if(!s.shopMode)s.shopMode='day';
  }catch(e){console.warn('Sanitize error',e);}
  return s;
}

function save(){try{G._ts=Date.now();localStorage.setItem(SAVE_KEY,JSON.stringify(G));}catch(e){}}
function load(){
  try{
    const r=localStorage.getItem(SAVE_KEY);if(!r)return;
    let s=JSON.parse(r);
    s=sanitize(s);
    const el=s._ts?Math.floor((Date.now()-s._ts)/1000):0;
    if(el>0)s.plots.forEach(p=>{if(p.plant&&!p.plant.done){p.plant.prog=Math.min(1,p.plant.prog+el/p.plant.growTime);if(p.plant.prog>=1)p.plant.done=true;}});
    Object.assign(G,s);G._ts=undefined;
    if(el>0)notify(T.notifBack+' ('+el+'s)');
  }catch(e){console.warn('Load failed, resetting:',e);localStorage.removeItem(SAVE_KEY);}
}

function getSeedData(id){return[...SEEDS,...FLOWERS,...MOON_PLANTS,...BLOOD_PLANTS].find(s=>s.id===id);}

function initShop(){

function restock(){
  const list=allSeedList();
  list.forEach(sd=>{
    let si=G.shop.find(s=>s.id===sd.id);
    if(!si){si={id:sd.id,qty:1,extra:0};G.shop.push(si);}
    si.qty=1;
    const c={common:0.6,uncommon:0.35,rare:0.2,epic:0.1,legendary:0.04,divine:0.01}[sd.rarity]||0.1;
    si.extra=Math.random()<c?1+Math.floor(Math.random()*4):0;
  });
  notify(T.notifRestock);sfx('restock');renderSeedShop();
}

/* ═══════════════════════════════════════
   INVENTORY
═══════════════════════════════════════ */
function addInv(item){
  if(item.type==='seed'){const i=G.inv.findIndex(x=>x.type==='seed'&&x.seedId===item.seedId);if(i>=0){G.inv[i].qty++;return;}}
  if(item.type==='crop'){
    // Stack crops by seedId+muts+size
    const mutsKey=JSON.stringify((item.muts||[]).slice().sort());
    const i=G.inv.findIndex(x=>x.type==='crop'&&x.seedId===item.seedId&&JSON.stringify((x.muts||[]).slice().sort())===mutsKey&&x.size===item.size);
    if(i>=0){G.inv[i].qty++;return;}
  }
  G.inv.push({...item,qty:1});
}
function seedInvIdx(sid){return G.inv.findIndex(x=>x.type==='seed'&&x.seedId===sid);}

/* ═══════════════════════════════════════
   CALC VALUE
═══════════════════════════════════════ */
function calcVal(plant){
  const sd=getSeedData(plant.seedId)||{base:1};
  const sz=SIZES.find(s=>s.id===plant.size)||SIZES[2];
  let m=sz.mult;
  (plant.muts||[]).forEach(mut=>{
    if(MUT_DATA[mut])m*=MUT_DATA[mut].mult;
  });
  return {val:Math.round(sd.base*m), base:sd.base, sizeMult:sz.mult, m};
}

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
function plantPlot(idx){
  if(G.selSlot===null)return;
  const ref=G.bar[G.selSlot];if(ref===null)return;
  const item=G.inv[ref];if(!item||item.type!=='seed')return;
  if(G.plots[idx].plant)return;
  const sd=getSeedData(item.seedId);
  G.plots[idx].plant={
    seedId:item.seedId, prog:0, growTime:sd.grow,
    done:false, muts:[], size:SIZES[Math.floor(Math.random()*SIZES.length)].id,
    fav:false, regrow:false
  };
  item.qty--;
  if(item.qty<=0){
    G.inv.splice(ref,1);
    G.bar=G.bar.map(b=>b===ref?null:(b>ref?b-1:b));
    // If selected slot is now empty, deselect it
    if(G.selSlot!==null&&G.bar[G.selSlot]===null) G.selSlot=null;
  }
  sfx('plant'); updateCursor(); renderAll(); save();
}

function harvestPlot(idx){
  const plot=G.plots[idx];if(!plot.plant||!plot.plant.done)return;
  const p=plot.plant;
  if(p.fav){notify(T.notifUnfav);return;}
  const sd=getSeedData(p.seedId);
  const{val}=calcVal(p);
  addInv({type:'crop',seedId:p.seedId,icon:sd.icon,name:sd.name,val,muts:p.muts,size:p.size,fav:false});

  if(sd.multiHarvest){
    // Regrow at 2× speed — keep SIZE, lose all mutations
    p.prog=0; p.done=false; p.fav=false;
    p.muts=[];  // mutations cleared on regrow
    p.growTime=Math.max(5, Math.round(sd.grow/2));
    p.regrow=true;
  } else {
    plot.plant=null;
  }
  sfx('harvest');renderAll();save();
}

function toggleFavPlot(idx){
  const p=G.plots[idx].plant;if(!p)return;
  p.fav=!p.fav;renderPlots();save();
}

function buySeed(sid){
  const sd=getSeedData(sid);if(!sd)return;
  if(G.money<sd.price){notify(T.notifNoMoney);return;}
  const si=G.shop.find(s=>s.id===sid);
  if((si.qty+si.extra)<=0){notify(T.notifNoStock);return;}
  G.money-=sd.price;
  if(si.qty>0)si.qty--;else si.extra--;
  addInv({type:'seed',seedId:sd.id,icon:sd.icon,name:sd.name+(IS_FR?' Graine':' Seed')});
  const empty=G.bar.findIndex(b=>b===null);
  if(empty>=0){const ii=seedInvIdx(sd.id);if(ii>=0&&!G.bar.includes(ii))G.bar[empty]=ii;}
  sfx('buy');notify(T.notifBought+sd.name+(IS_FR?' Graine':' Seed'));renderAll();save();
}

/* ═══════════════════════════════════════
   SOUND
═══════════════════════════════════════ */
let actx=null;
function getACtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx;}
function sfx(type){
  if(!G.sfxOn)return;
  try{
    const ctx=getACtx();
    if(type==='mutate'){
      // Nice rising chime: two oscillators, short decay
      [523.25,783.99].forEach((freq,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=freq;
        const t=ctx.currentTime+i*0.12;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.18,t+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
        o.start(t);o.stop(t+0.5);
      });
      return;
    }
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    const SFX={plant:[440,0.07,'sine'],harvest:[660,0.11,'triangle'],buy:[550,0.06,'sine'],restock:[880,0.17,'sine']};
    const[f,v,tp]=SFX[type]||[440,0.07,'sine'];
    o.type=tp;o.frequency.value=f;
    g.gain.setValueAtTime(v,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    o.start();o.stop(ctx.currentTime+0.4);
  }catch(e){}
}

/* ═══════════════════════════════════════
   MUSIC
═══════════════════════════════════════ */
const TRACKS={
  main:['Grow a Garden Soundtrack - Main Theme.mp3','Grow a Garden Soundtrack - Main Theme 4.mp3'],
  night:['Grow a Garden Soundtrack - Night Theme 1.mp3','Grow a Garden Soundtrack - Night Theme 2.mp3'],
  bee:['bee event.mp3'],
  sandstorm:['Sandstorm.mp3'],
  frost:['Ice.mp3'],
  disco:['Disco.mp3'],
  aurora:['Aurora.mp3'],
};
let audioEl=null,curTrackType=null,tidxDay=0,tidxNight=0,muSwitch=null;
function buildAudio(){
  if(audioEl)return;
  audioEl=new Audio();
  audioEl.volume=0.35;
  audioEl.addEventListener('ended',()=>{
    // When a track ends, play the next track of the same type (loop through both)
    advanceTrack(curTrackType);
  });
}
function playTrack(type){
  if(!G.musicOn)return;
  buildAudio();
  const list=TRACKS[type]||TRACKS.main;
  const idx=(type==='night'?tidxNight:tidxDay)%list.length;
  audioEl.src=list[idx];
  audioEl.currentTime=0;
  audioEl.play().catch(()=>{});
  curTrackType=type;
}
function advanceTrack(type){
  // Cycle through the 2 tracks for this type indefinitely
  if(type==='night') tidxNight=(tidxNight+1)%TRACKS.night.length;
  else               tidxDay  =(tidxDay  +1)%TRACKS.main.length;
  playTrack(type);
}
function switchMusic(type){
  if(!G.musicOn){stopMusic();return;}
  if(curTrackType===type)return; // already playing right type
  if(muSwitch)clearTimeout(muSwitch);
  stopMusic();
  // 2-second silence gap when switching day↔night
  muSwitch=setTimeout(()=>playTrack(type),2000);
}
function stopMusic(){if(!audioEl)return;audioEl.pause();audioEl.src='';curTrackType=null;}

/* ═══════════════════════════════════════
   WEATHER SYSTEM
   Cycle: every 10 min, roll a weather
   Active phase: 5 min (weather effects can mutate)
   Then: 5 min clear (no mutation from weather)
═══════════════════════════════════════ */
let parts=[];
let lightningTimer=0, nextLightningTime=3+Math.random()*4;

function setWeather(w, active){
  G.weather=w;G.wxActive=active;
  document.getElementById('wx-name').textContent=w.emoji+' '+w.name()+(active?'':(IS_FR?' (accalmie)':' (clearing)'));
  parts=[];lightningTimer=0;nextLightningTime=2+Math.random()*4;
  // Reset bee/tornado/sandstorm state on new weather
  tornadoActive=false;
  if(!active||w.id!=='bee'){bees=[];}
  beeShopHidden=false;
  // Remove overlays if switching away
  if(!active||w.id!=='sandstorm') document.body.classList.remove('sandstorm');
  if(!active||w.id!=='disco')     document.body.classList.remove('disco');
  if(!active||w.id!=='aurora')    document.body.classList.remove('aurora');
  if(active){
    if(w.id==='tornado'){spawnTornado();}
    if(w.id==='bee'){
      beeEventActive=true;bees=[];spawnBees();
      switchMusic('bee');
      // Update shop header
      document.getElementById('seed-hdr').style.background='#443300';
      document.getElementById('seed-shop-title').textContent=IS_FR?'🌻 BOUTIQUE FLEURS':'🌻 FLOWER SHOP';
      if(document.getElementById('seed-shop-title-m'))document.getElementById('seed-shop-title-m').textContent=IS_FR?'🌻 FLEURS':'🌻 FLOWERS';
      renderSeedShop();
    }
    if(w.id==='sandstorm'){
      document.body.classList.add('sandstorm');
      switchMusic('sandstorm');
    }
    if(w.id==='frost'){
      switchMusic('frost');
    }
    if(w.id==='disco'){
      document.body.classList.add('disco');
      switchMusic('disco');
    }
    if(w.id==='aurora'){
      document.body.classList.add('aurora');
      switchMusic('aurora');
    }
    spawnWeatherParts(w);
  } else {
    // Clearing — restore appropriate music
    if(w.id==='sandstorm'||w.id==='frost'||w.id==='disco'||w.id==='aurora'){
      switchMusic(G.isNight?'night':'main');
    }
  }
}

function spawnWeatherParts(w){
  const cv=document.getElementById('weather-canvas');
  const W=cv.width, H=cv.height;
  parts=[];
  if(w.id==='rain'||w.id==='wet'){
    for(let i=0;i<130;i++) parts.push({type:'rain',x:Math.random()*W,y:Math.random()*H,vx:-0.8,vy:6+Math.random()*3,len:9+Math.random()*6,a:0.22+Math.random()*0.18,c:w.id==='wet'?'#4466ff':'#88ccff'});
  } else if(w.id==='storm'){
    for(let i=0;i<160;i++) parts.push({type:'rain',x:Math.random()*W,y:Math.random()*H,vx:-2.5,vy:7+Math.random()*5,len:12+Math.random()*10,a:0.28+Math.random()*0.22,c:'#9999ee'});
  } else if(w.id==='frost'){
    for(let i=0;i<80;i++) parts.push({type:'flake',x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.4,vy:0.4+Math.random()*0.7,r:2+Math.random()*3,a:0.6+Math.random()*0.35,c:'#ddeeff',spin:Math.random()*Math.PI*2,dspin:(Math.random()-0.5)*0.04});
  } else if(w.id==='chilled'){
    for(let i=0;i<50;i++) parts.push({type:'flake',x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.3,vy:0.3+Math.random()*0.5,r:1.5+Math.random()*2,a:0.4+Math.random()*0.3,c:'#aaeeff',spin:Math.random()*Math.PI*2,dspin:(Math.random()-0.5)*0.03});
  } else if(w.id==='fog'){
    for(let i=0;i<40;i++) parts.push({type:'fog',x:Math.random()*W,y:H*0.15+Math.random()*H*0.75,vx:0.12+Math.random()*0.15,vy:0,r:55+Math.random()*90,a:0.035+Math.random()*0.03,c:'#aabbcc'});
  } else if(w.id==='heatwave'){
    for(let i=0;i<70;i++) parts.push({type:'heat',x:Math.random()*W,y:H*0.4+Math.random()*H*0.6,vx:(Math.random()-0.5)*0.5,vy:-(0.6+Math.random()*1.8),r:2+Math.random()*4,a:0.18+Math.random()*0.18,c:Math.random()<0.5?'#ff7722':'#ffaa33',life:1,maxLife:50+Math.random()*70});
  } else if(w.id==='rainbow'){
    const cols=['#ff4444','#ff8800','#ffdd00','#44dd44','#3399ff','#aa44ff','#ff44aa'];
    for(let i=0;i<100;i++) parts.push({type:'spark',x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.7,vy:-0.4-Math.random()*0.7,r:2+Math.random()*2.5,a:0.5+Math.random()*0.45,c:cols[i%cols.length],life:1,maxLife:70+Math.random()*90});
  } else if(w.id==='tornado'){
    // Debris swirling around the tornado (drawn separately in drawTornado)
    // Just add ambient dust particles
    for(let i=0;i<30;i++) parts.push({type:'spark',x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*1.5,vy:-0.3-Math.random()*0.8,r:1+Math.random()*2,a:0.2+Math.random()*0.25,c:'#bbddee',life:1,maxLife:30+Math.random()*40});
  } else if(w.id==='bee'){
    // Warm golden shimmer
    for(let i=0;i<30;i++) parts.push({type:'spark',x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.3,vy:-0.2-Math.random()*0.3,r:1.5+Math.random()*2,a:0.2+Math.random()*0.3,c:Math.random()<0.5?'#ffdd44':'#ffaa00',life:1,maxLife:80+Math.random()*60});
  } else if(w.id==='sandstorm'){
    // Sand grains falling/drifting from top, blown sideways
    for(let i=0;i<200;i++) parts.push({type:'sand',x:Math.random()*W,y:Math.random()*H,vx:3+Math.random()*4,vy:1.5+Math.random()*2.5,r:1+Math.random()*2,a:0.3+Math.random()*0.45,c:Math.random()<0.5?'#c8a050':'#e0c070'});
  } else if(w.id==='disco'){
    // Disco balls: spinning light beams + bouncing sparkles
    const discoCols=['#ff00cc','#ff6600','#ffee00','#00ff88','#00ccff','#aa00ff','#ff0066'];
    for(let i=0;i<120;i++){
      const c=discoCols[i%discoCols.length];
      parts.push({type:'disco',x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*2.5,vy:(Math.random()-0.5)*2.5,r:2+Math.random()*3,a:0.7+Math.random()*0.3,c,life:1,maxLife:40+Math.random()*60,cIdx:i%discoCols.length,cols:discoCols});
    }
  } else if(w.id==='aurora'){
    // Wavy ribbons of colour drifting across the top of the screen
    const auroraCols=['#00ffaa','#00ccff','#8800ff','#00ff88','#44ffdd'];
    for(let i=0;i<60;i++){
      parts.push({type:'aurora',x:Math.random()*W,y:H*0.05+Math.random()*H*0.45,vx:0.3+Math.random()*0.4,vy:0,r:30+Math.random()*60,a:0.05+Math.random()*0.08,c:auroraCols[i%auroraCols.length],wave:Math.random()*Math.PI*2,waveSpeed:0.02+Math.random()*0.02,waveAmp:18+Math.random()*25});
    }
  }
}

// TORNADO logic
function spawnTornado(){
  const cv=document.getElementById('weather-canvas');
  tornadoX=cv.width*0.5;tornadoY=cv.height*0.3;
  const ang=Math.random()*Math.PI*2;
  tornadoVx=Math.cos(ang)*55;tornadoVy=Math.sin(ang)*28;
  tornadoActive=true;
}
function tickTornado(dt){
  if(!tornadoActive)return;
  const cv=document.getElementById('weather-canvas');
  tornadoX+=tornadoVx*dt;tornadoY+=tornadoVy*dt;
  if(tornadoX<30||tornadoX>cv.width-30)tornadoVx*=-1;
  if(tornadoY<30||tornadoY>cv.height*0.8)tornadoVy*=-1;
  // Check plot collisions
  const wrap=document.getElementById('plots-wrap');
  const plots=[...wrap.querySelectorAll('.plot')];
  plots.forEach((el,idx)=>{
    const r=el.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    if(Math.hypot(tornadoX-cx,tornadoY-cy)<r.width*0.85){
      const p=G.plots[idx].plant;
      if(p&&!(p.muts||[]).includes('windstruck')){
        if(applyMutation(p,'windstruck')){
          const sd=getSeedData(p.seedId)||{name:'?'};
          notify('🌪 '+sd.name+' → '+(IS_FR?'Coup de vent ×3.5':'Windstruck ×3.5'));
          sfx('mutate');renderPlots();
        }
      }
    }
  });
}

// BEE logic
function spawnBees(){
  const cv=document.getElementById('weather-canvas');
  bees=[];
  for(let i=0;i<14;i++) bees.push({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-0.5)*60,vy:(Math.random()-0.5)*40,targetIdx:-1,timer:Math.random()*3});
}
function tickBees(dt){
  if(!beeEventActive)return;
  const cv=document.getElementById('weather-canvas');
  const wrap=document.getElementById('plots-wrap');
  const plots=[...wrap.querySelectorAll('.plot')];
  bees.forEach(bee=>{
    bee.timer-=dt;
    if(bee.timer<=0){
      bee.timer=2+Math.random()*4;
      const planted=G.plots.map((p,i)=>({p,i})).filter(x=>x.p.plant);
      if(planted.length)bee.targetIdx=planted[Math.floor(Math.random()*planted.length)].i;
      else{bee.targetIdx=-1;bee.vx=(Math.random()-0.5)*60;bee.vy=(Math.random()-0.5)*40;}
    }
    if(bee.targetIdx>=0&&plots[bee.targetIdx]){
      const r=plots[bee.targetIdx].getBoundingClientRect();
      const tx=r.left+r.width/2,ty=r.top+r.height/2;
      const dx=tx-bee.x,dy=ty-bee.y,dist=Math.hypot(dx,dy);
      if(dist<22){
        const p=G.plots[bee.targetIdx].plant;
        if(p&&!(p.muts||[]).includes('pollinated')){
          if(applyMutation(p,'pollinated')){
            const sd=getSeedData(p.seedId)||{name:'?'};
            notify('🐝 '+sd.name+' → '+(IS_FR?'Pollinisé ×2':'Pollinated ×2'));
            sfx('mutate');renderPlots();
          }
        }
        bee.targetIdx=-1;bee.vx=(Math.random()-0.5)*60;bee.vy=(Math.random()-0.5)*40;
      } else {bee.vx=dx/dist*80;bee.vy=dy/dist*80;}
    }
    bee.x+=bee.vx*dt;bee.y+=bee.vy*dt;
    const W=cv.width,H=cv.height;
    if(bee.x<0){bee.x=0;bee.vx=Math.abs(bee.vx);}if(bee.x>W){bee.x=W;bee.vx=-Math.abs(bee.vx);}
    if(bee.y<0){bee.y=0;bee.vy=Math.abs(bee.vy);}if(bee.y>H){bee.y=H;bee.vy=-Math.abs(bee.vy);}
  });
}

function tickParts(){
  if(!G.partOn){parts=[];return;}
  const cv=document.getElementById('weather-canvas');
  const W=cv.width,H=cv.height;
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.spin!==undefined) p.spin+=p.dspin||0;
    if(p.type==='heat'||p.type==='spark'||p.type==='disco'){
      p.life-=1/p.maxLife;
      p.a=Math.max(0,p.life*(p.type==='heat'?0.28:0.8));
      if(p.life<=0){
        p.life=1; p.maxLife=40+Math.random()*60;
        if(p.type==='heat'){p.x=Math.random()*W;p.y=H*0.4+Math.random()*H*0.6;}
        else if(p.type==='disco'){
          p.x=Math.random()*W;p.y=Math.random()*H;
          p.vx=(Math.random()-0.5)*2.5;p.vy=(Math.random()-0.5)*2.5;
          p.cIdx=(p.cIdx+1)%p.cols.length;p.c=p.cols[p.cIdx];
        }
        else{p.x=Math.random()*W;p.y=H*0.2+Math.random()*H*0.7;}
      }
    }
    if(p.type==='aurora'){
      p.wave+=p.waveSpeed;
      p.vy=Math.sin(p.wave)*0.4;
    }
    if(p.type==='rain'){if(p.y>H+p.len){p.y=-p.len;p.x=Math.random()*W;}if(p.x<-30)p.x=W+30;}
    else if(p.type==='flake'){if(p.y>H){p.y=-10;p.x=Math.random()*W;}if(p.x<0)p.x=W;if(p.x>W)p.x=0;}
    else if(p.type==='fog'){if(p.x>W+p.r)p.x=-p.r;}
    else if(p.type==='sand'){if(p.x>W+10){p.x=-10;p.y=Math.random()*H*0.6;}if(p.y>H){p.y=-5;p.x=Math.random()*W;}}
    else if(p.type==='aurora'){if(p.x>W+p.r)p.x=-p.r;}
  });
}

function drawParts(){
  const cv=document.getElementById('weather-canvas'),ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  if(!G.partOn||!parts.length)return;
  parts.forEach(p=>{
    const alpha=Math.max(0,p.a);
    ctx.globalAlpha=alpha;
    if(p.type==='rain'){
      ctx.strokeStyle=p.c; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+p.vx*2.5,p.y+p.vy*2.5); ctx.stroke();
    } else if(p.type==='flake'){
      ctx.strokeStyle=p.c; ctx.lineWidth=1;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.spin||0);
      for(let a=0;a<6;a++){
        ctx.save(); ctx.rotate(a*Math.PI/3);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-p.r); ctx.stroke();
        // small branches
        ctx.beginPath(); ctx.moveTo(0,-p.r*0.5); ctx.lineTo(p.r*0.3,-p.r*0.75); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,-p.r*0.5); ctx.lineTo(-p.r*0.3,-p.r*0.75); ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    } else if(p.type==='fog'){
      const grad=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
      grad.addColorStop(0,p.c); grad.addColorStop(1,'transparent');
      ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    } else if(p.type==='sand'){
      // Oval sand grain, slightly elongated in direction of travel
      ctx.fillStyle=p.c;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(Math.atan2(p.vy,p.vx));
      ctx.beginPath();
      ctx.ellipse(0,0,p.r*1.6,p.r*0.7,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if(p.type==='disco'){
      // Bright glowing sparkle with a 4-point star shape
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.shadowBlur=12; ctx.shadowColor=p.c;
      ctx.fillStyle=p.c;
      ctx.beginPath();
      for(let a=0;a<8;a++){
        const ang=a*Math.PI/4;
        const r2=a%2===0?p.r:p.r*0.35;
        a===0?ctx.moveTo(Math.cos(ang)*r2,Math.sin(ang)*r2):ctx.lineTo(Math.cos(ang)*r2,Math.sin(ang)*r2);
      }
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
      ctx.restore();
    } else if(p.type==='aurora'){
      // Soft glowing ribbon
      const grad=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
      grad.addColorStop(0,p.c);
      grad.addColorStop(1,'transparent');
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.ellipse(p.x,p.y,p.r,p.r*0.22,0,0,Math.PI*2);
      ctx.fill();
    } else {
      ctx.shadowBlur=6; ctx.shadowColor=p.c;
      ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
  });
  ctx.globalAlpha=1;
  // Draw tornado on top if active
  if(tornadoActive&&G.partOn) drawTornado(ctx);
  // Draw bees on top if active
  if(beeEventActive&&G.partOn){
    ctx.font='14px serif';
    bees.forEach(b=>{ctx.globalAlpha=0.9;ctx.fillText('🐝',b.x-7,b.y+5);});
    ctx.globalAlpha=1;
  }
}

let tornadoAngle=0;
function drawTornado(ctx){
  tornadoAngle+=0.08;
  const x=tornadoX,y=tornadoY;
  const H=140; // funnel height
  ctx.save();
  // Funnel layers from top (wide) to bottom (narrow tip)
  for(let i=0;i<=12;i++){
    const t=i/12;
    const r=50*(1-t*0.85); // top 50px wide, tip ~7px
    const ly=y+t*H;
    const alpha=0.12+t*0.06;
    ctx.strokeStyle=`rgba(150,210,240,${alpha})`;
    ctx.lineWidth=2+t*2;
    ctx.beginPath();
    // Ellipse that spins
    for(let a=0;a<=Math.PI*2;a+=0.2){
      const ex=x+Math.cos(a+tornadoAngle*(1+t))*r;
      const ey=ly+Math.sin(a+tornadoAngle*(1+t))*r*0.3;
      a===0?ctx.moveTo(ex,ey):ctx.lineTo(ex,ey);
    }
    ctx.closePath();ctx.stroke();
  }
  // Dark funnel fill
  const grad=ctx.createLinearGradient(x,y,x,y+H);
  grad.addColorStop(0,'rgba(80,130,160,0.18)');
  grad.addColorStop(1,'rgba(40,80,110,0.32)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(x-50,y);
  ctx.lineTo(x+50,y);
  ctx.lineTo(x+7,y+H);
  ctx.lineTo(x-7,y+H);
  ctx.closePath();ctx.fill();
  // Ground dust cloud
  const dustGrad=ctx.createRadialGradient(x,y+H,0,x,y+H,35);
  dustGrad.addColorStop(0,'rgba(180,150,100,0.45)');
  dustGrad.addColorStop(1,'transparent');
  ctx.fillStyle=dustGrad;
  ctx.beginPath();ctx.ellipse(x,y+H,35,12,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// Lightning strike: either hits a crop (to mutate it) or random position
function doLightningStrike(targetPlotEl){
  if(!G.partOn)return;
  const fl=document.getElementById('lightning-flash');
  fl.classList.add('strike');
  // No sound — removed to avoid headache
  setTimeout(()=>fl.classList.remove('strike'),80);

  // draw bolt on weather canvas
  const cv=document.getElementById('weather-canvas');
  const ctx=cv.getContext('2d');
  let x,y;
  if(targetPlotEl){
    const rect=targetPlotEl.getBoundingClientRect();
    x=rect.left+rect.width/2;y=rect.top;
  } else {
    // Map area only
    const ma=document.getElementById('map-area');
    const mr=ma.getBoundingClientRect();
    x=mr.left+Math.random()*mr.width;
    y=mr.top+Math.random()*mr.height*0.3;
  }
  drawLightningBolt(ctx, x, cv.height*0.05, x+(Math.random()-0.5)*60, y);
  setTimeout(()=>{ drawParts(); },180);
}

function drawLightningBolt(ctx,x1,y1,x2,y2){
  ctx.save();
  ctx.strokeStyle='rgba(220,200,255,0.95)';
  ctx.lineWidth=2;
  ctx.shadowBlur=12;ctx.shadowColor='#a4f';
  ctx.beginPath();
  let cx=x1,cy=y1;
  const steps=8;
  ctx.moveTo(cx,cy);
  for(let i=1;i<=steps;i++){
    const t=i/steps;
    const nx=x1+(x2-x1)*t+(Math.random()-0.5)*30;
    const ny=y1+(y2-y1)*t;
    ctx.lineTo(nx,ny);
    cx=nx;cy=ny;
  }
  ctx.stroke();
  ctx.restore();
}

/* ═══════════════════════════════════════
   MUTATION — each plant can accumulate ALL mutations (array)
   Fusions: hydrated+frosty → frozen(×25), windstruck+misty → twisted(×30)
═══════════════════════════════════════ */
function applyMutation(plant, mutName, fromFusion=false){
  if(!plant.muts)plant.muts=[];
  if(plant.muts.includes(mutName))return false;
  // Fusion mutations can only come from checkFusions, not from weather
  if(!fromFusion && MUT_DATA[mutName]&&MUT_DATA[mutName].fusion)return false;
  plant.muts.push(mutName);
  if(!fromFusion)checkFusions(plant);
  return true;
}

function checkFusions(plant){
  const m=plant.muts;
  // hydrated + frosty → frozen (source mutations KEPT, fusion added on top)
  if(m.includes('hydrated')&&m.includes('frosty')&&!m.includes('frozen')){
    plant.muts.push('frozen');
    notify('🧊 '+(IS_FR?'Fusion : Gelé ×25 !':'Fusion: Frozen ×25!'));
  }
  // windstruck + misty → twisted (source mutations KEPT)
  if(m.includes('windstruck')&&m.includes('misty')&&!m.includes('twisted')){
    plant.muts.push('twisted');
    notify('🌀 '+(IS_FR?'Fusion : Tordu ×30 !':'Fusion: Twisted ×30!'));
  }
  // moonlit + bloodlit → celestial ×300 (source mutations KEPT)
  if(m.includes('moonlit')&&m.includes('bloodlit')&&!m.includes('celestial')){
    plant.muts.push('celestial');
    const sd=getSeedData(plant.seedId)||{name:'?'};
    notify('⭐ '+sd.name+' — '+(IS_FR?'Céleste ×300 !':'Celestial ×300!'));
    sfx('mutate');
  }
  // sandy + hydrated → mud ×5
  if(m.includes('sandy')&&m.includes('hydrated')&&!m.includes('mud')){
    plant.muts.push('mud');
    notify('🟤 '+(IS_FR?'Fusion : Boueux ×5 !':'Fusion: Muddy ×5!'));
    sfx('mutate');
  }
  // mud + scorched → clay ×10
  if(m.includes('mud')&&m.includes('scorched')&&!m.includes('clay')){
    plant.muts.push('clay');
    notify('🏺 '+(IS_FR?'Fusion : Argileux ×10 !':'Fusion: Clay ×10!'));
    sfx('mutate');
  }
  // clay + twisted → pot ×50
  if(m.includes('clay')&&m.includes('twisted')&&!m.includes('pot')){
    plant.muts.push('pot');
    notify('🪴 '+(IS_FR?'Fusion : En Pot ×50 !':'Fusion: Potted ×50!'));
    sfx('mutate');
  }
}

// Periodic fusion check (every 30s) — re-checks all plants
function checkAllFusions(){
  G.plots.forEach(p=>{if(p.plant&&p.plant.muts&&p.plant.muts.length>=2)checkFusions(p.plant);});
}

function tryMutate(){
  if(!G.wxActive||!G.weather.mut)return;
  if(Math.random()>0.1)return;
  // Only pick plants that DON'T already have this mutation
  const mutName=G.weather.mut;
  const eligible=G.plots.filter(p=>p.plant&&!(p.plant.muts||[]).includes(mutName));
  if(!eligible.length)return;
  const plot=eligible[Math.floor(Math.random()*eligible.length)];
  const applied=applyMutation(plot.plant,mutName);
  if(!applied)return;

  // For storm: animate lightning at that plot (no sound — removed)
  if(G.weather.id==='storm'){
    const el=document.getElementById('plots-wrap').children[G.plots.indexOf(plot)];
    doLightningStrike(el);
  }

  const sd=getSeedData(plot.plant.seedId);
  const md=MUT_DATA[mutName];
  const mutLabel=md?md.label():'?';
  notify('✨ '+sd.name+' → '+mutLabel+' ×'+md.mult+' '+G.weather.emoji);
  sfx('mutate');renderPlots();
}

function tryMoonlit(){
  if(!G.isNight||Math.random()>0.05)return;
  const mutName=isBloodMoon?'bloodlit':'moonlit';
  const eligible=G.plots.filter(p=>p.plant&&!(p.plant.muts||[]).includes(mutName));
  if(!eligible.length)return;
  const plot=eligible[Math.floor(Math.random()*eligible.length)];
  applyMutation(plot.plant,mutName);
  const sd=getSeedData(plot.plant.seedId)||{name:'?'};
  const md=MUT_DATA[mutName];
  notify((isBloodMoon?'🩸':'🌙')+' '+sd.name+' → '+md.label()+' ×'+md.mult);
  sfx('mutate');renderPlots();
}

function mutGlowStyle(muts){
  if(!muts||!muts.length)return'';
  const shadows=muts.filter(m=>MUT_DATA[m]).map(m=>`inset 0 0 8px ${MUT_DATA[m].glow}`);

function renderPlots(){
  const wrap=document.getElementById('plots-wrap');wrap.innerHTML='';
  G.plots.forEach((plot,idx)=>{
    const div=document.createElement('div');div.className='plot';

    if(plot.plant){
      const p=plot.plant,sd=getSeedData(p.seedId);
      const prog=Math.min(1,p.prog),done=p.done||prog>=1;
      if(done)div.classList.add('ready');
      if(p.fav)div.classList.add('fav-plot');
      if(G.moveMode&&G.moveSrc===idx)div.style.borderColor='#fa0';

      const hasDisco=(p.muts||[]).includes('disco');
      if(hasDisco) div.classList.add('disco-plant');
      const glow=mutGlowStyle(p.muts);
      if(glow&&!hasDisco)div.style.boxShadow=glow;

      const ico=done?sd.icon:sd.seedIcon;
      const sz='sz-'+p.size;
      const mutArr=(p.muts||[]).filter(m=>MUT_DATA[m]);
      const mutIcons=mutArr.map(m=>`<span class="p-mut-icon" title="${MUT_DATA[m].label()} ×${MUT_DATA[m].mult}">${MUT_DATA[m].icon}</span>`).join('');

      // Name: prismatic gets rainbow gradient, others get rarity color
      let nameHtml;
      if(sd.rarity==='prismatic'){
        nameHtml=`<span class="p-name" style="${PRISM_GRAD}">${sd.name}${p.regrow?'↺':''}</span>`;
      } else {
        const nameColor=done?(RARITY_COLOR[sd.rarity]||'#aaa'):'#888';
        nameHtml=`<span class="p-name" style="color:${nameColor}">${sd.name}${p.regrow?'↺':''}</span>`;
      }

      div.innerHTML=`<div class="plant-wrap">
        ${p.fav?'<span class="p-heart">♥</span>':''}
        <div class="p-main">
          <span class="p-icon ${sz} ${done?'done-crop':'growing'}">${ico}</span>
          ${nameHtml}
          ${!done?`<div class="p-bar-bg"><div class="p-bar" style="width:${(prog*100).toFixed(0)}%"></div></div>`:''}
        </div>
        <div class="p-muts" data-n="${Math.min(mutArr.length,5)||1}">${mutIcons}</div>
      </div>`;

      div.addEventListener('mouseenter',e=>showTT(e,p,sd));
      div.addEventListener('mouseleave',hideTT);

      div.onclick=()=>{
        if(G.moveMode){ handleMoveClick(idx); return; }
        if(G.favMode){ toggleFavPlot(idx); return; }
        if(done) harvestPlot(idx);

      div.addEventListener('contextmenu',e=>{

      });
    } else {
      div.onclick=()=>{
        if(G.moveMode){ handleMoveClick(idx); return; }

      };
    }
    wrap.appendChild(div);
  });
}

let ttOn=false;
function showTT(e,plant,sd){
  const tt=document.getElementById('tt');
  const sz=SIZES.find(s=>s.id===plant.size);
  const pct=Math.round((sz.mult-1)*100);
  const{val,base}=calcVal(plant);
  const tl=plant.done?T.ttReady:Math.round((1-plant.prog)*plant.growTime)+T.ttLeft;

  let mutsHtml='';
  (plant.muts||[]).forEach(mut=>{
    const md=MUT_DATA[mut];
    if(md)mutsHtml+=`<div class="tt-m" style="color:${md.glow.replace('0.55','1')}">${md.icon} ${md.label()} ×${md.mult}</div>`;
  });

  const favLine=plant.fav?`<div class="tt-fav">${T.ttFaved}</div>`:'';
  const ttNameHtml=rarityNameHtml(sd.name, sd.rarity);
  const ttBadgeHtml=rarityBadgeHtml(sd.rarity);
  tt.innerHTML=`<div class="tt-n">${ttNameHtml} ${ttBadgeHtml}${plant.fav?' ♥':''}</div>
    ${favLine}
    <div class="tt-s">${T.ttSize}${sz.label()} (${pct>=0?'+':''}${pct}%)</div>
    ${mutsHtml}
    <div class="tt-v">${T.ttValue}${fmt(val)}</div>
    <div class="tt-base">${T.ttBase}${fmt(base)}</div>
    <div class="tt-t">${tl}${plant.regrow?T.ttRegrow:''}</div>
    <div class="tt-t" style="color:#555;font-size:9px">${IS_FR?'Clic droit = vendre (base)':'Right-click = sell (base value)'}</div>`;
  tt.classList.add('show');ttOn=true;moveTT(e);
}
function hideTT(){document.getElementById('tt').classList.remove('show');ttOn=false;}
function moveTT(e){
  const tt=document.getElementById('tt');
  const W=window.innerWidth,H=window.innerHeight;
  const tw=tt.offsetWidth||230,th=tt.offsetHeight||160;
  // Prefer above cursor; fall back to below if not enough room
  let top=e.clientY-th-10;
  if(top<4)top=e.clientY+20;
  // Horizontal: left-align but clamp to screen
  let left=e.clientX+10;
  if(left+tw>W-4)left=e.clientX-tw-10;
  if(left<4)left=4;
  tt.style.left=left+'px';
  tt.style.top=top+'px';
}
document.addEventListener('mousemove',e=>{if(ttOn)moveTT(e);});

   DAY / NIGHT  (30 real-min each = 1800s)
   Blood Moon: every 5 days instead of regular night
═══════════════════════════════════════ */
function tickDN(dt){
  G.tod=(G.tod+dt/1800)%1;
  const was=G.isNight;G.isNight=G.tod>=0.5;
  const h=Math.floor(G.tod*24),m=Math.floor((G.tod*24%1)*60);
  document.getElementById('time-lbl').textContent=h.toString().padStart(2,'0')+':'+m.toString().padStart(2,'0');
  const dayEl=document.getElementById('day-lbl');

  if(G.isNight&&!was){
    // Transitioning to night: 45% chance of blood moon
    const thisIsBloodMoon = Math.random() < 0.45;
    document.body.classList.add('night');
    if(thisIsBloodMoon){
      isBloodMoon=true;
      document.body.classList.add('bloodmoon');
      if(G.musicOn)switchMusic('night');
      notify('🩸 '+(IS_FR?'Lune de sang ! Mutation Ensanglantée ×25 !':'Blood Moon! Bloodlit mutation ×25!'));
      bloodShopActive=true; moonShopActive=false;
      G.shopMode='blood';
      setShopHeader('blood');
    } else {
      isBloodMoon=false;
      document.body.classList.remove('bloodmoon');
      switchMusic('night');
      moonShopActive=true; bloodShopActive=false;
      G.shopMode='moon';
      setShopHeader('moon');
    }
    renderSeedShop();
  } else if(!G.isNight&&was){
    document.body.classList.remove('night');
    document.body.classList.remove('bloodmoon');
    isBloodMoon=false;
    moonShopActive=false; bloodShopActive=false;
    G.shopMode='day';
    G.day++;
    // No longer need bloodMoonDay scheduling
    switchMusic('main');
    setShopHeader('day');
    renderSeedShop();
  }

  const icon=isBloodMoon?'🩸':(G.isNight?'🌙':'🌞');
  const label=isBloodMoon?(IS_FR?'Lune de sang ':'Blood Moon '):
               G.isNight?(IS_FR?'Nuit ':'Night '):
               (IS_FR?'Jour ':'Day ');
  dayEl.textContent=icon+' '+label+G.day;
}

let lastT=performance.now(),shopT=0;
// Weather state machine timers
let wxPhaseTimer=0;   // counts within current phase
const WX_ACTIVE_DUR=300;  // 5 min active
const WX_CLEAR_DUR =300;  // 5 min clear
const WX_CYCLE=600;       // 10 min total cycle

function tickWeather(dt){
  wxPhaseTimer+=dt;

  if(G.wxActive){
    const rem=Math.max(0,WX_ACTIVE_DUR-wxPhaseTimer);
    document.getElementById('wx-timer').textContent=(IS_FR?'Actif ':'Active ')+Math.floor(rem/60)+':'+Math.floor(rem%60).toString().padStart(2,'0');

    // Bee event: hide shop 10s before end to prevent bugs
    if(beeEventActive&&!beeShopHidden&&rem<=10){
      beeShopHidden=true;
      renderSeedShop();
      notify(IS_FR?'🐝 La boutique fleurs ferme bientôt...':'🐝 Flower shop closing soon...');
    }

    if(wxPhaseTimer>=WX_ACTIVE_DUR){
      wxPhaseTimer=0;
      G.wxActive=false;
      G.weather=WEATHERS[0];
      document.getElementById('wx-name').textContent=IS_FR?'☀ Dégagé (accalmie)':'☀ Clear (downtime)';
      parts=[];
      // Clean up sandstorm overlay
      document.body.classList.remove('sandstorm');
      document.body.classList.remove('disco');
      document.body.classList.remove('aurora');
      // Clean up bee event
      if(beeEventActive){
        beeEventActive=false;beeShopHidden=false;bees=[];
        // Restore seed shop header
        document.getElementById('seed-hdr').style.background='';
        document.getElementById('seed-shop-title').textContent=IS_FR?T.seedShopHdr:'🔵 SEED SHOP';
        if(document.getElementById('seed-shop-title-m'))document.getElementById('seed-shop-title-m').textContent=IS_FR?'🔵 GRAINES':'🔵 SEEDS';
        if(!isBloodMoon)switchMusic(G.isNight?'night':'main');
        renderSeedShop();
      }
      // Restore music after sandstorm, frost, disco, or aurora
      if(curTrackType==='sandstorm'||curTrackType==='frost'||curTrackType==='disco'||curTrackType==='aurora'){
        switchMusic(G.isNight?'night':'main');
      }
      tornadoActive=false;
    }
    // Storm lightning
    if(G.weather.id==='storm'&&G.partOn){
      lightningTimer+=dt;
      if(lightningTimer>=nextLightningTime){
        lightningTimer=0;nextLightningTime=2+Math.random()*5;
        doLightningStrike(null);
      }
    }
    // Tornado movement
    if(G.weather.id==='tornado'&&tornadoActive)tickTornado(dt);
    // Bee movement
    if(G.weather.id==='bee'&&beeEventActive)tickBees(dt);
  } else {
    const rem=Math.max(0,WX_CLEAR_DUR-wxPhaseTimer);
    document.getElementById('wx-timer').textContent=(IS_FR?'Prochain ':'Next ')+Math.floor(rem/60)+':'+Math.floor(rem%60).toString().padStart(2,'0');
    if(wxPhaseTimer>=WX_CLEAR_DUR){
      wxPhaseTimer=0;
      const choices=WEATHERS.filter(w=>w.id!=='clear');
      const w=choices[Math.floor(Math.random()*choices.length)];
      G.weather=w;G.wxActive=true;
      setWeather(w,true);
      notify(w.emoji+' '+w.name()+' '+(IS_FR?'météo !':'weather!'));
    }
  }
}

function tickMutation(dt){
  if(!G.wxActive||!G.weather.mut)return;
  G.mutTimer+=dt;
  if(G.mutTimer>=10){G.mutTimer=0;tryMutate();}
}

function loop(now){
  const dt=Math.min((now-lastT)/1000,0.5);lastT=now;

  // Grow
  G.plots.forEach(p=>{
    if(p.plant&&!p.plant.done){
      p.plant.prog+=dt/p.plant.growTime;
      if(p.plant.prog>=1){p.plant.prog=1;p.plant.done=true;}
    }
  });

  tickWeather(dt);
  tickMutation(dt);

  // Fusion check every 30s
  if(Math.floor(now/30000)!==Math.floor((now-dt*1000)/30000)){
    checkAllFusions();
    G._ts=Date.now();save();
  }
  // Moonlit uses its own cadence (~10s via separate check)
  if(Math.floor(now/10000)!==Math.floor((now-dt*1000)/10000)){
    tryMoonlit();
  }

  // Shop restock
  shopT+=dt;
  if(shopT>=300){shopT=0;restock();}
  const rem=Math.max(0,300-shopT);
  const restockTxt=Math.floor(rem/60)+':'+Math.floor(rem%60).toString().padStart(2,'0');
  document.getElementById('restock-time').textContent=restockTxt;
  const rtm=document.getElementById('restock-time-m');if(rtm)rtm.textContent=restockTxt;

  tickDN(dt);
  tickParts();drawParts();

  // Cursor
  const c=document.getElementById('cursor'),l=document.getElementById('cursor-label');
  c.style.left=mx+'px';c.style.top=my+'px';l.style.left=mx+'px';l.style.top=my+'px';

  // Re-render periodically
  if(Math.floor(now/500)!==Math.floor((now-dt*1000)/500)){
    renderPlots();renderBar();renderMoney();
    // Clean up bar slots where inv item no longer exists
    let dirty=false;
    G.bar=G.bar.map(b=>{if(b!==null&&!G.inv[b]){dirty=true;return null;}return b;});
    if(dirty)renderBar();
  }

  requestAnimationFrame(loop);
}

document.getElementById('tog-sfx').onclick=function(){G.sfxOn=!G.sfxOn;this.textContent=G.sfxOn?T.on:T.off;this.classList.toggle('on',G.sfxOn);};

};
document.querySelectorAll('.ifbtn').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.ifbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');invFilter=b.dataset.f;renderInvModal();};});
document.addEventListener('keydown',e=>{
  const n=parseInt(e.key);
  if(n>=1&&n<=9){G.selSlot=G.selSlot===(n-1)?null:n-1;updateCursor();renderBar();}
  else if(e.key==='0'){G.selSlot=G.selSlot===9?null:9;updateCursor();renderBar();}
  else if(e.key==='Escape'){
    G.selSlot=null;G.moveSrc=null;updateCursor();renderBar();renderPlots();
    document.getElementById('inv-modal').classList.remove('open');
    document.getElementById('set-modal').classList.remove('open');
    hideTT();
  }
  else if(e.key==='f'||e.key==='F'){
    G.favMode=!G.favMode;G.moveMode=false;G.moveSrc=null;
    const b=document.getElementById('fav-btn');
    b.classList.toggle('on',G.favMode);
    b.textContent=G.favMode?T.favBtnOn:T.favBtn;
  }
  else if(e.key==='m'||e.key==='M'){
    G.moveMode=!G.moveMode;G.favMode=false;G.moveSrc=null;
    const b=document.getElementById('move-btn');
    b.classList.toggle('on',G.moveMode);
    b.textContent=G.moveMode?(IS_FR?'↕ Déplacer (ON)':'↕ Move (ON)'):(IS_FR?'↕ Déplacer':'↕ Move');
    renderPlots();
  }
});

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function init(){
  load();
  if(!G.shop||!G.shop.length)initShop();
  // Migrate old mut (string) to muts (array) in plots
  G.plots.forEach(p=>{
    if(p.plant&&p.plant.mut!==undefined&&!p.plant.muts){
      p.plant.muts=p.plant.mut?[p.plant.mut]:[];
      delete p.plant.mut;
    }
  });
  G.inv.forEach(i=>{
    if(i.mut!==undefined&&!i.muts){i.muts=i.mut?[i.mut]:[];delete i.mut;}
  });

  // Apply translations to static HTML elements
  document.title=T.title;
  document.getElementById('inv-open-btn').textContent=T.invBtn;
  document.getElementById('sell-hdr').textContent=T.sellShopHdr;
  document.getElementById('sell-all-btn').textContent=T.sellAllBtn;
  document.getElementById('seed-shop-title').textContent=T.seedShopHdr;
  document.getElementById('settings-btn-r').textContent=T.settingsBtn;
  document.getElementById('fav-btn').textContent=T.favBtn;
  document.getElementById('move-btn').textContent=IS_FR?'↕ Déplacer':'↕ Move';
  document.getElementById('harvest-all-btn').textContent=IS_FR?'🌾 Tout récolter':'🌾 Harvest All';
  document.getElementById('top-info').textContent=T.topInfo;
  document.getElementById('inv-htitle').textContent=T.invTitle;
  // Filter buttons
  const fbts=document.querySelectorAll('.ifbtn');
  const fkeys=[T.fAll,T.fSeeds,T.fCrops,T.fFavs];
  fbts.forEach((b,i)=>{if(fkeys[i])b.textContent=fkeys[i];});
  // Settings modal
  document.querySelector('.set-title').textContent=T.settingsTitle;
  const setRows=document.querySelectorAll('.set-row span');
  if(setRows[0])setRows[0].textContent=T.music;
  if(setRows[1])setRows[1].textContent=T.sfx;
  if(setRows[2])setRows[2].textContent=T.particles;
  const compactLbl=document.getElementById('compact-label');
  if(compactLbl)compactLbl.textContent=IS_FR?'Nombres compacts (1k…)':'Compact numbers (1k…)';
  const togCompact=document.getElementById('tog-compact');
  if(togCompact){
    togCompact.textContent=G.compactNums?T.on:T.off;
    togCompact.classList.toggle('on',G.compactNums);
  }
  document.getElementById('set-close').textContent=T.close;
  // wx-timer label prefix
  document.getElementById('wx-timer-label').textContent=IS_FR?'Prochain : ':'Next: ';

  // Restore night body class
  document.body.classList.toggle('night', G.isNight);

  // Init blood moon overlay element (may not exist if loaded from older HTML)
  if(!document.getElementById('bloodmoon-overlay')){
    const ov=document.createElement('div');ov.id='bloodmoon-overlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(120,0,0,0);pointer-events:none;transition:background 5s ease;z-index:4;';
    document.body.appendChild(ov);
  }

  // Restore shop mode from saved state (so reload keeps the active event shop)
  if(G.isNight && G.shopMode==='blood'){
    isBloodMoon=true;
    bloodShopActive=true; moonShopActive=false;
    document.body.classList.add('bloodmoon');
    setShopHeader('blood');
  } else if(G.isNight && G.shopMode==='moon'){
    isBloodMoon=false;
    moonShopActive=true; bloodShopActive=false;
    setShopHeader('moon');
  } else {
    isBloodMoon=false;
    moonShopActive=false; bloodShopActive=false;
    setShopHeader('day');
  }
  renderAll();
  document.addEventListener('click',function startMu(){buildAudio();switchMusic(G.isNight?'night':'main');document.removeEventListener('click',startMu);},{once:true});
  lastT=performance.now();requestAnimationFrame(loop);
  notify(T.notifWelcome);
  notify(T.notifTips);
  if(IS_FR)notify('💡 Clic droit sur une parcelle = vendre la plante (valeur base) · M=déplacer');
  else      notify('💡 Right-click plot = sell plant (base value) · M=move mode');
}
init();
</script>
